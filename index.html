<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="imageSection">
        <img src="images/bgImage.jpg" alt="#" />
        <div class="odin">
          <img src="images/logo.png" alt="" />
          <p>ODIN</p>
        </div>
      </div>
      <div class="textSection">
        <p class="pageDescription">
          This is not a real online service! You know you need something like
          this in your life to help you realize your deepest dreams.
          <span>Sign up now to get started</span>
        </p>
        <p>You know you want to.</p>
        <div class="form">
          <h4>Lets's do this!</h4>
          <form>
            <div class="inputs">
              <div class="odd">
                <label for="first_name">FIRST NAME</label>
                <input
                  type="text"
                  id="first_name"
                  name="first_name"
                  required
                  maxlength="20"
                  placeholder="upto 20 characters"
                />
              </div>
              <div class="even">
                <label for="last_name">LAST NAME</label
                ><input type="text" id="last_name" name="last_name" />
              </div>
              <div class="odd">
                <label for="email">EMAIL</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="eg: abc@example.com"
                  required
                />
              </div>
              <div class="even">
                <label for="phone">PHONE NUMBER</label
                ><input
                  type="tel"
                  id="phone"
                  name="tel"
                  required
                  placeholder="upto 10 digits"
                  maxlength="10"
                />
              </div>
              <div class="odd">
                <label for="password">PASSWORD</label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  required
                  pattern="[A-Z a-z 0-9]{6,12}"
                  minlength="6"
                  maxlength="12"
                  placeholder="6-12 character [A-Z a-z 0-9]"
                />
              </div>
              <div class="even">
                <label for="password">CONFIRM PASSWORD</label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  required
                  pattern="[A-Z a-z 0-9 ]{6,12}"
                  minlength="6"
                  maxlength="12"
                  placeholder="6-12 character [A-Z a-z 0-9]"
                />
              </div>
            </div>
            <button type="submit">Create Account</button>
          </form>
        </div>
        <button></button>
        <p>
          Already have an account? <span><a href="login.html">Log In</a></span>
        </p>
      </div>
    </div>
  </body>
</html>
